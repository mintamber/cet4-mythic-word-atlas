const KEY='cet4_mythic_word_atlas_progress';
const defaultState=()=>({version:1,mastery:{},mistakes:[],favorites:[],vague:[],seen:[],completedDays:[],lastPosition:{day:1,index:0},streak:1,bestStreak:1,lastActive:'',speechSettings:{voiceURI:'',rate:.86,pitch:1.02,volume:1}});
const uniq=a=>[...new Set(a)];
const clampMastery=n=>Math.max(0,Math.min(5,Math.round((Number(n)||0)*2)/2));
function sanitizeState(raw={}){const d=defaultState(),valid=new Set(WORDS.map(w=>w.id)),arr=k=>uniq(Array.isArray(raw[k])?raw[k].filter(x=>valid.has(x)):[]),speechNumber=(value,fallback,min,max)=>{const n=Number(value);return value!==''&&Number.isFinite(n)?Math.max(min,Math.min(max,n)):fallback};const mastery={};if(raw.mastery&&typeof raw.mastery==='object')for(const [k,v] of Object.entries(raw.mastery))if(valid.has(k))mastery[k]=clampMastery(v);const speechSettings={voiceURI:String(raw.speechSettings?.voiceURI||''),rate:speechNumber(raw.speechSettings?.rate,d.speechSettings.rate,.7,1.15),pitch:speechNumber(raw.speechSettings?.pitch,d.speechSettings.pitch,.8,1.2),volume:speechNumber(raw.speechSettings?.volume,d.speechSettings.volume,0,1)};return {...d,...raw,version:1,mastery,mistakes:arr('mistakes'),favorites:arr('favorites'),vague:arr('vague'),seen:arr('seen'),completedDays:uniq((raw.completedDays||[]).map(Number).filter(n=>n>=1&&n<=10)),lastPosition:raw.lastPosition&&raw.lastPosition.day?raw.lastPosition:d.lastPosition,speechSettings}}
function loadState(){try{return sanitizeState(JSON.parse(localStorage.getItem(KEY)||'{}'))}catch(e){return defaultState()}}
let state=loadState();
function saveState(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}
function changeMastery(id,delta){state.mastery[id]=clampMastery((state.mastery[id]||0)+delta)}
function applyConfidence(id,kind){state.seen=uniq([...state.seen,id]);if(kind==='know'){changeMastery(id,1);state.vague=state.vague.filter(x=>x!==id)}if(kind==='vague'){changeMastery(id,-.5);state.vague=uniq([...state.vague,id])}if(kind==='no'){changeMastery(id,-1);state.mistakes=uniq([...state.mistakes,id])}saveState()}
function applyPractice(id,correct){changeMastery(id,correct?1:-1);state.seen=uniq([...state.seen,id]);if(!correct)state.mistakes=uniq([...state.mistakes,id]);else if((state.mastery[id]||0)>=3)state.mistakes=state.mistakes.filter(x=>x!==id);saveState()}
function reviewPool(){return uniq([...state.mistakes,...state.vague,...state.seen.filter(id=>(state.mastery[id]||0)<3)]).map(id=>WORDS.find(w=>w.id===id)).filter(Boolean)}
function recommendedDay(){return SCENES.find(s=>!state.completedDays.includes(s.day))?.day||10}
function touchStreak(){const now=new Date(),today=now.toISOString().slice(0,10);if(!state.lastActive){state.lastActive=today;saveState();return}const prev=new Date(state.lastActive+'T00:00:00'),diff=Math.round((new Date(today+'T00:00:00')-prev)/86400000);if(diff===1)state.streak++;else if(diff>1)state.streak=1;state.bestStreak=Math.max(state.bestStreak,state.streak);state.lastActive=today;saveState()}

function scene(day){return SCENES[day-1]||SCENES[0]}function dayWords(day){return WORDS.filter(w=>w.day===day)}function mastery(id){return state.mastery[id]||0}
function escapeHTML(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
const speechAttr=text=>encodeURIComponent(String(text||''));
const SPEECH_FALLBACK='Please install or enable an English system voice.';
const PREFERRED_VOICE_NAMES=['Samantha','Eddy'];
let speechVoices=[];
function speechSupported(){return 'speechSynthesis'in window&&'SpeechSynthesisUtterance'in window}
function rankEnglishVoices(voices){const eligibleRank=voice=>{const name=String(voice.name||'').toLowerCase(),lang=String(voice.lang||'');if(name.includes('samantha')&&/^en[-_]us$/i.test(lang))return 0;if(name.includes('eddy')&&/^en[-_]gb$/i.test(lang))return 1;return-1};return [...voices].filter(voice=>eligibleRank(voice)>=0).sort((a,b)=>eligibleRank(a)-eligibleRank(b)||String(a.name||'').localeCompare(String(b.name||''))||String(a.voiceURI||'').localeCompare(String(b.voiceURI||'')))}
function loadVoices(){if(!speechSupported()){speechVoices=[];return speechVoices}speechVoices=rankEnglishVoices(speechSynthesis.getVoices());if(speechVoices.length&&!speechVoices.some(v=>v.voiceURI===state.speechSettings.voiceURI)){state.speechSettings.voiceURI=speechVoices[0].voiceURI;saveState()}return speechVoices}
function selectedVoice(){return speechVoices.find(v=>v.voiceURI===state.speechSettings.voiceURI)||null}
function speechReady(){return speechSupported()&&!!selectedVoice()}
function stopSpeech(){if(speechSupported())speechSynthesis.cancel();document.querySelectorAll('.speak-active').forEach(el=>el.classList.remove('speak-active'))}
function speakText(text,{button=null}={}){if(!text)return;if(!speechVoices.length)loadVoices();const voice=selectedVoice();if(!speechSupported()||!voice){showToast(SPEECH_FALLBACK);return}stopSpeech();const u=new SpeechSynthesisUtterance(text);u.voice=voice;u.lang=voice.lang;u.rate=state.speechSettings.rate;u.pitch=state.speechSettings.pitch;u.volume=state.speechSettings.volume;if(button){button.classList.add('speak-active');u.onend=u.onerror=()=>button.classList.remove('speak-active')}speechSynthesis.speak(u)}
function renderSpeechSettings(){if(!ui.speechOpen)return'';const ready=speechReady();return `<aside class="speech-popover" aria-label="朗读设置"><div class="speech-popover-head"><h3>Voice Atelier · 朗读设置</h3><button class="icon-btn speech-close" data-close-speech-settings aria-label="关闭朗读设置">×</button></div><div class="speech-controls"><label>Voice<select data-voice-select ${ready?'':'disabled'}>${speechVoices.length?speechVoices.map(v=>`<option value="${escapeHTML(v.voiceURI)}" ${v.voiceURI===state.speechSettings.voiceURI?'selected':''}>${escapeHTML(v.name)} · ${escapeHTML(v.lang)}</option>`).join(''):`<option>${SPEECH_FALLBACK}</option>`}</select></label><label>Rate · <span data-speech-value="rate">${state.speechSettings.rate.toFixed(2)}</span><input type="range" min="0.70" max="1.15" step="0.01" value="${state.speechSettings.rate}" data-speech-rate></label><label>Pitch · <span data-speech-value="pitch">${state.speechSettings.pitch.toFixed(2)}</span><input type="range" min="0.80" max="1.20" step="0.01" value="${state.speechSettings.pitch}" data-speech-pitch></label><label>Volume · <span data-speech-value="volume">${state.speechSettings.volume.toFixed(2)}</span><input type="range" min="0" max="1" step="0.05" value="${state.speechSettings.volume}" data-speech-volume></label>${ready?'':`<p class="speech-unavailable">${SPEECH_FALLBACK}</p>`}<div class="speech-actions"><button class="ghost-btn" data-voice-preview ${ready?'':'disabled'}>Preview</button><button class="ghost-btn" data-stop-speech>Stop</button></div></div></aside>`}
function sceneArt(s){const motifs={oracle:'<path class="solid" d="M90 210V60h28v150m50 0V60h28v150m50 0V60h28v150M55 220h255M75 52h220l-40-28H115Z"/>',library:'<path class="glow" d="M70 220V85Q180-20 290 85v135M110 220V95Q180 25 250 95v125M180 35v185M90 130h180"/><path class="solid" d="M40 205q45-38 90 0t90 0t90 0v25H40Z"/>',snow:'<path class="solid" d="m20 220 85-130 55 75 48-110 132 165Z"/><path class="glow" d="M115 220V70h130v150M145 220V105h70v115m-86-95 100 0M180 50v44"/>',dragon:'<path class="glow" d="M50 210Q90 75 170 125q45-90 120-45-60 8-52 64 40 18 54 66M128 215V105h104v110"/><path class="solid" d="m55 220 55-65 38 65m75 0 40-55 55 55Z"/>',mirror:'<path class="glow" d="M55 220V80Q110 10 165 80v140M195 220V80Q250 10 305 80v140M75 205h70V90Q110 48 75 90Zm140 0h70V90q-35-42-70 0Z"/>',market:'<path class="solid" d="M20 220h320l-45-80-50 60-65-105-65 110-48-55Z"/><path class="glow" d="M60 55q120-70 240 0M95 68q85 45 170 0M112 90v65m136-65v65m-145-46h18v25h-18Zm136 0h18v25h-18Z"/>',glass:'<path class="solid" d="m20 220 105-180 44 112 52-125 119 193Z"/><path class="glow" d="m125 40 44 112 52-125m-95 15 12 178m83-192-15 192m-62-66 92 30"/>',harbor:'<path class="glow" d="M25 180q40-30 80 0t80 0t80 0t80 0M30 205q40-30 80 0t80 0t80 0t80 0M155 165V65l85 65h-85m-20 35h125l-24 40h-80Z"/><circle class="solid" cx="70" cy="100" r="20"/>',labyrinth:'<path class="glow" d="M35 215V45h290v170H75V85h210v90H115v-50h130M180 65v120M145 100h70"/><circle class="solid" cx="180" cy="65" r="8"/>',academy:'<circle class="glow" cx="180" cy="120" r="82"/><circle class="glow" cx="180" cy="120" r="42"/><path class="glow" d="M180 25v190M85 120h190m-162-67 134 134m0-134L113 187M55 220h250"/><circle class="solid" cx="180" cy="120" r="10"/>'};return `<svg viewBox="0 0 360 240" preserveAspectRatio="xMidYMid slice" aria-hidden="true">${motifs[s.id]||motifs.academy}</svg>`}
function setView(name,opts={}){ui.view=name;Object.assign(ui,opts);document.body.className=`scene-${scene(ui.day).id}`;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===name));render();scrollTo({top:0,behavior:matchMedia('(prefers-reduced-motion: reduce)').matches?'auto':'smooth'})}
function metrics(){const learned=state.seen.length,mastered=WORDS.filter(w=>mastery(w.id)>=5).length,total=WORDS.reduce((a,w)=>a+mastery(w.id),0)/(WORDS.length*5);return{learned,mastered,rate:Math.round(total*100),completed:state.completedDays.length}}
function renderHome(){const m=metrics(),d=recommendedDay(),s=scene(d),today=dayWords(d).filter(w=>state.seen.includes(w.id)).length;return `<section class="view hero"><div class="hero-copy"><div class="eyebrow">A vocabulary odyssey · <span class="zh-display">四级神话词汇图谱</span></div><h1 class="display">CET-4 Mythic <span>Word Atlas</span></h1><p class="subtitle zh-reading">A mythic vocabulary journey for advanced CET-4 learners. 十天，十座传说关卡，让高价值词汇在记忆中拥有坐标。</p><div class="actions"><button class="primary-btn" data-enter-day="${d}">Start Today’s Quest</button><button class="ghost-btn" data-view="map">Enter Word Atlas</button><button class="ghost-btn" data-view="review">Review Mistakes</button></div></div><aside class="glass moon-panel"><div class="moon"></div><div class="orbit"></div><div class="eyebrow">Recommended · Day ${d}</div><h2 style="font:400 2.2rem var(--serif);position:relative;margin:.4em 0">${s.en}</h2><p class="subtitle zh-display" style="position:relative">${LISTS[d-1]} · ${today}/20 encountered</p><div class="metrics"><div class="metric"><strong>${today}/20</strong><span>Today</span></div><div class="metric"><strong>${m.rate}%</strong><span>Mastery</span></div><div class="metric"><strong>${m.completed}/10</strong><span>Quests</span></div></div></aside></section>`}
function renderMap(){const rec=recommendedDay();return `<section class="view"><div class="eyebrow">The ten realms</div><h1 class="section-title">Mythic Atlas</h1><p class="subtitle">每一座视觉关卡承载一组按学习价值排列的核心词。场景是旅途，词汇才是坐标。</p><div class="map-grid">${SCENES.map((s,i)=>{const ws=dayWords(s.day),n=ws.filter(w=>mastery(w.id)>=3).length,p=n/20*100,stars=Math.min(3,Math.floor(n/7));return `<article class="glass level scene-${s.id} ${state.completedDays.includes(s.day)?'complete':''} ${rec===s.day?'recommended':''}" style="animation-delay:${i*.06}s"><div class="scene-art">${sceneArt(s)}</div><div class="level-head"><span class="day-badge">DAY ${String(s.day).padStart(2,'0')}</span><span class="stars">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</span></div><h3>${s.en}</h3><div class="level-cn">${s.cn}</div><div class="meta">${LISTS[i]} · 20 words</div><div class="progress-track"><div class="progress-fill" style="width:${p}%"></div></div><div class="level-foot"><span class="meta">${n}/20 skilled</span><button class="ghost-btn" data-enter-day="${s.day}">Enter</button></div></article>`}).join('')}</div></section>`}
function renderSenseDeck(w){const senses=w.senses?.length?w.senses:[{pos:w.pos,phonetic:w.phonetic,meaningCN:w.meaningCN,meaningEN:w.meaningEN}];return `<div class="sense-deck">${senses.map((sense,i)=>`<section class="sense-item"><div class="sense-head"><span class="pos-pill">${escapeHTML(sense.pos)}</span><span>${escapeHTML(sense.phonetic||w.phonetic)}</span><span class="meta">Sense ${i+1}</span></div><div class="sense-meaning-cn">${escapeHTML(sense.meaningCN)}</div><div class="sense-meaning-en">${escapeHTML(sense.meaningEN)}</div></section>`).join('')}</div>`}
function renderCollocationConstellation(w){const notes=w.collocationNotes?.length?w.collocationNotes:(w.collocations||[]).map(en=>({en,cn:'常用搭配'}));return `<section class="collocation-constellation"><div class="eyebrow">Collocation constellation · 搭配星图</div><div class="collocation-notes">${notes.map(note=>`<div class="collocation-note"><strong>${escapeHTML(note.en)}</strong><span>${escapeHTML(note.cn)}</span></div>`).join('')}</div></section>`}
function renderUsagePanels(w){const panels=[['Word family · 词族',w.wordFamily],['Synonyms · 近义词',w.synonyms],['Antonyms · 反义词',w.antonyms]].filter(([,items])=>items?.length);return `<div class="usage-panels">${panels.map(([title,items])=>`<section class="usage-panel"><h3>${title}</h3><div class="chip-list">${items.map(item=>`<span class="chip">${escapeHTML(item)}</span>`).join('')}</div></section>`).join('')}<section class="usage-panel"><h3>Usage compass · 用法提醒</h3><div class="usage-note">${escapeHTML(w.usageNote||'结合语境辨认词性与搭配。')}</div></section></div>`}
function renderExamples(w){const examples=w.examples?.length?w.examples:[{type:'cet4',label:'CET-4 Context',text:w.example,translationCN:w.meaningCN,attributionType:'original',speakText:w.example}],disabled=speechReady()?'':'disabled';return `<section class="example-section"><h3 class="examples-title">Three windows of meaning · 三重语境</h3><div class="example-grid">${examples.map(e=>{const source=e.sourceTitle?`${e.sourceTitle}${e.sourceAuthor?` · ${e.sourceAuthor}`:''}`:e.type==='literature'?'Literary adaptation':e.type==='world'?'Recent-world context':'Original CET-4 sentence';return `<article class="example-card" data-example-type="${escapeHTML(e.type)}"><div class="example-head"><span class="example-label">${escapeHTML(e.label)}</span><button class="listen-mini" data-speak-text="${speechAttr(e.text)}" aria-label="朗读例句" ${disabled}>▶</button></div><p class="example-text">${escapeHTML(e.text)}</p><div class="example-translation">${escapeHTML(e.translationCN)}</div><div class="example-source">${escapeHTML(source)}</div></article>`}).join('')}</div></section>`}
function renderLearn(){const ws=dayWords(ui.day),w=ws[ui.index]||ws[0],s=scene(ui.day),senses=w.senses?.length?w.senses:[{pos:w.pos}],parts=[...new Set(senses.map(x=>x.pos).filter(Boolean))],speechDisabled=speechReady()?'':'disabled';return `<section class="view"><div class="scene-banner glass scene-${s.id}"><div class="scene-art">${sceneArt(s)}</div><div class="scene-copy"><div class="eyebrow">Day ${ui.day} · ${ui.index+1} of 20</div><h2>${s.en}</h2><div class="subtitle zh-display">${LISTS[ui.day-1]}</div></div></div><div class="learn-layout" style="margin-top:20px"><aside class="glass learn-side"><div class="eyebrow">Word path</div><div class="progress-track"><div class="progress-fill" style="width:${(ui.index+1)*5}%"></div></div><div class="mini-list">${ws.map((x,i)=>`<button class="mini-word ${i===ui.index?'active':''}" data-word-index="${i}">${String(i+1).padStart(2,'0')} · ${x.word}</button>`).join('')}</div></aside><div><article class="glass word-card" data-card><div class="word-top"><div><div class="eyebrow">Difficulty ${'◆'.repeat(w.difficulty)}${'◇'.repeat(5-w.difficulty)}</div><h1 class="word">${escapeHTML(w.word)}</h1><span class="phonetic">${escapeHTML(w.phonetic)}</span><div class="pos-pills">${parts.map(p=>`<span class="pos-pill">${escapeHTML(p)}</span>`).join('')}</div></div><div class="word-tools"><button class="icon-btn" data-speak-text="${speechAttr(w.word)}" aria-label="朗读 ${escapeHTML(w.word)}" ${speechDisabled}>▶</button><button class="icon-btn" data-speech-settings aria-label="朗读设置">⚙</button><button class="icon-btn" data-favorite="${w.id}" aria-label="收藏 ${escapeHTML(w.word)}">${state.favorites.includes(w.id)?'★':'☆'}</button></div></div>${renderCollocationConstellation(w)}${renderSpeechSettings()}<div class="deep-card-grid">${renderSenseDeck(w)}${renderUsagePanels(w)}</div>${renderExamples(w)}<div class="memory-row"><div class="cue zh-reading"><span class="eyebrow">Memory scene</span><br>${escapeHTML(w.memoryCue)}</div>${w.contrastNote?`<div class="contrast zh-note"><span class="eyebrow">Contrast</span><br>${escapeHTML(w.contrastNote)}</div>`:'<div class="contrast zh-note"><span class="eyebrow">Study ritual</span><br>先听单词，再用三个语境判断它在句中的角色。</div>'}</div><div class="card-actions"><button class="confidence no" data-confidence="no" data-id="${w.id}">Don’t know</button><button class="confidence" data-confidence="vague" data-id="${w.id}">Vague</button><button class="confidence know" data-confidence="know" data-id="${w.id}">Know it</button></div></article><div class="stepper"><button class="ghost-btn" data-step="-1" ${ui.index===0?'disabled':''}>← Previous</button><span class="meta">Mastery ${mastery(w.id)} / 5</span>${ui.index===19?`<button class="primary-btn" data-practice-day="${ui.day}">Practice →</button>`:`<button class="ghost-btn" data-step="1">Next →</button>`}</div></div></div></section>`}
const MODES={en_cn:{name:'English → Chinese',icon:'EN',desc:'从四个中文释义中辨认含义'},cn_en:{name:'Chinese → English',icon:'中',desc:'从释义反向提取英文词'},spell:{name:'Spelling Magic',icon:'✦',desc:'点击星尘字母完成拼写'},story:{name:'Story Recall',icon:'☾',desc:'从微型记忆画面召回单词'}};
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function buildQuestion(mode,target){const distractors=shuffle(WORDS.filter(w=>w.id!==target.id)).slice(0,3),choices=shuffle([target,...distractors]);return{mode,target,choices,answered:false,correct:null}}
function createPracticeSession(pool,mode=null){const unique=[...new Map(pool.map(word=>[word.id,word])).values()];return{mode,pool:unique,queue:shuffle(unique.map(word=>word.id)),index:0,total:unique.length,correctCount:0,wrongCount:0,q:null,complete:false}}
function questionFromQueue(session){const target=WORDS.find(word=>word.id===session.queue[session.index]);return target?buildQuestion(session.mode,target):null}
function makeQuestion(mode,pool){const session=createPracticeSession(pool,mode);return questionFromQueue(session)}
function startPractice(day,review=false){const pool=review?reviewPool():dayWords(day);ui.practice=createPracticeSession(pool);ui.review=review;ui.day=day||recommendedDay();setView('practice')}
function renderModePicker(){const total=ui.practice?.total||0;return `<section class="view"><div class="eyebrow">${ui.review?'Review ritual':`Day ${ui.day} practice`}</div><h1 class="section-title">Choose your magic</h1><p class="subtitle zh-reading">任选一种检索方式完成本轮 ${total} 个词。每个词只出现一次；其他模式完全自愿，不影响进入下一关。</p><div class="optional-note zh-ui">✦ Optional ritual · 可随时结束练习并返回地图，已完成的题目仍会保存熟练度。</div><div class="mode-grid">${Object.entries(MODES).map(([k,m])=>`<button class="mode-card" data-mode="${k}"><span class="mode-icon">${m.icon}</span><b>${m.name}</b><span class="meta zh-ui">${m.desc}</span></button>`).join('')}</div><button class="ghost-btn" data-view="${ui.review?'review':'learn'}">← Back</button></section>`}
function renderPracticeSummary(){const p=ui.practice,accuracy=p.total?Math.round(p.correctCount/p.total*100):0,nextDay=Math.min(10,ui.day+1);return `<section class="view"><article class="glass result-seal"><div class="eyebrow">Constellation complete</div><div class="result-orb"><strong>${accuracy}%</strong></div><h1 class="section-title">One pass, no echoes.</h1><p class="subtitle zh-reading" style="margin-inline:auto">本轮每个目标词恰好出现一次。你可以换一种模式继续，也可以直接进入下一词单。</p><div class="result-grid"><div class="metric"><strong>${p.total}</strong><span>Unique words</span></div><div class="metric"><strong>${p.correctCount}</strong><span>Correct</span></div><div class="metric"><strong>${p.wrongCount}</strong><span>To review</span></div></div><div class="actions" style="justify-content:center"><button class="ghost-btn" data-try-mode>${ui.review?'Review Another Mode':'Try Another Mode'}</button>${ui.review?`<button class="primary-btn" data-view="review">Return to Review</button>`:ui.day<10?`<button class="primary-btn" data-next-day="${nextDay}">Next Day →</button>`:`<button class="primary-btn" data-view="progress">View Progress</button>`}<button class="ghost-btn" data-view="map">Return to Atlas</button></div></article></section>`}
function renderPractice(){if(!ui.practice||!ui.practice.mode)return renderModePicker();if(ui.practice.complete)return renderPracticeSummary();const q=ui.practice.q,m=MODES[q.mode],w=q.target;let body='';if(q.mode==='spell'){const letters=ui.practice.letters;body=`<div class="hint zh-reading">${w.meaningCN}<br><span style="font-family:var(--sans)">${w.meaningEN}</span></div><div class="spell-answer">${ui.spell.length?ui.spell.join(''):'······'}</div><div class="letters">${letters.map((l,i)=>`<button class="letter ${ui.practice.used.includes(i)?'used':''}" data-letter="${i}">${l}</button>`).join('')}</div><div class="actions" style="justify-content:center"><button class="ghost-btn" data-spell="undo">Undo</button><button class="ghost-btn" data-spell="reset">Reset</button><button class="primary-btn" data-spell="check">Cast spell</button></div>`}else{const prompt=q.mode==='en_cn'?w.word:q.mode==='cn_en'?w.meaningCN:w.memoryCue,zh=q.mode!=='en_cn'?'zh-reading':'';body=`<div class="question ${zh}">${prompt}</div>${q.mode==='story'?'<div class="hint">Which word belongs to this memory scene?</div>':''}<div class="choices">${q.choices.map(c=>{const text=q.mode==='en_cn'?c.meaningCN:c.word,cls=q.answered?(c.id===w.id?'correct':q.correct===c.id?'wrong':''):'';return `<button class="choice ${cls} ${q.mode==='en_cn'?'zh-reading':''}" data-answer="${c.id}" ${q.answered?'disabled':''}>${text}</button>`}).join('')}</div>`}return `<section class="view"><div class="practice-head"><div class="eyebrow">${ui.review?'Review pool':`Day ${ui.day}`} · ${m.name}</div><button class="ghost-btn" data-end-practice>End Practice</button></div><div class="glass practice-card ${q.answered&&!q.correct?'shake':''}" data-practice-card><div class="meta">Question ${ui.practice.index+1} / ${ui.practice.total}</div>${body}<div class="feedback ${q.answered?(q.correct?'good':'bad'):''}" role="status" aria-live="polite">${q.answered?(q.correct?`Correct · ${w.word} — <span class="zh-reading">${w.meaningCN}</span>`:`Not quite · ${w.word} — <span class="zh-reading">${w.meaningCN}</span>. ${w.meaningEN}`):'Choose carefully. Your mastery updates after each answer.'}</div>${q.answered?`<div class="actions"><button class="primary-btn" data-next-question>${ui.practice.index+1>=ui.practice.total?'View Results':'Next constellation →'}</button></div>`:''}</div></section>`}
function renderReview(){const pool=reviewPool();if(!pool.length)return `<section class="view"><div class="glass empty"><div><div style="font-size:3rem;color:var(--gold)">✦</div><h1 class="section-title">Your review pool is clear.</h1><p class="subtitle">No mistakes, vague words, or low-mastery seen words are waiting.</p><button class="primary-btn" data-view="map">Explore the Atlas</button></div></div></section>`;return `<section class="view"><div class="eyebrow">Memory restoration</div><h1 class="section-title">Review Pool</h1><p class="subtitle">${pool.length} words gathered from mistakes, vague answers, and low mastery.</p><div class="glass detail-drawer">${pool.slice(0,10).map(w=>`<span class="tab">${w.word} · ${mastery(w.id)}</span>`).join(' ')}</div><button class="primary-btn" data-start-review>Begin Review Ritual</button></section>`}
function dots(n){return `<span class="mastery-dots" aria-label="熟练度 ${n}/5">${Array.from({length:5},(_,i)=>`<i class="dot ${i<n?'on':''}"></i>`).join('')}</span>`}
function renderWordbook(){let ws=WORDS;if(ui.bookTab==='mistakes')ws=ws.filter(w=>state.mistakes.includes(w.id));if(ui.bookTab==='favorites')ws=ws.filter(w=>state.favorites.includes(w.id));if(ui.bookTab==='mastered')ws=ws.filter(w=>mastery(w.id)>=5);if(ui.search)ws=ws.filter(w=>`${w.word} ${w.meaningCN}`.toLowerCase().includes(ui.search.toLowerCase()));const detail=ui.detail&&WORDS.find(w=>w.id===ui.detail);return `<section class="view"><div class="eyebrow">Your living lexicon</div><h1 class="section-title">Wordbook</h1><div class="tabs">${[['all','All'],['mistakes','Mistakes'],['favorites','Favorites'],['mastered','Mastered']].map(([k,n])=>`<button class="tab ${ui.bookTab===k?'active':''}" data-book-tab="${k}">${n}</button>`).join('')}</div><input class="search" id="word-search" value="${escapeHTML(ui.search)}" placeholder="Search English or Chinese…" aria-label="搜索词汇">${detail?`<article class="glass detail-drawer"><button class="icon-btn" style="float:right" data-close-detail>×</button><div class="eyebrow">Day ${detail.day} · ${detail.pos}</div><h2 style="font:400 2.6rem var(--serif);margin:.25em 0">${detail.word}</h2><div>${detail.phonetic} · ${detail.meaningCN}</div><p class="subtitle">${detail.meaningEN}<br>“${detail.example}”</p></article>`:''}<div class="word-list">${ws.map(w=>`<article class="word-row" data-detail="${w.id}" tabindex="0"><div><strong>${w.word}</strong><div class="meta">${w.pos} · ${w.meaningCN}</div></div>${dots(mastery(w.id))}</article>`).join('')||'<div class="empty"><p>No words found in this realm.</p></div>'}</div></section>`}
function renderProgress(){const m=metrics();return `<section class="view"><div class="eyebrow">Constellation record</div><h1 class="section-title">Your Progress</h1><div class="stats-grid"><div class="glass stat-card"><strong>${m.learned}</strong><span class="meta">Words encountered</span></div><div class="glass stat-card"><strong>${m.mastered}</strong><span class="meta">Mastered</span></div><div class="glass stat-card"><strong>${state.mistakes.length}</strong><span class="meta">Mistakes</span></div><div class="glass stat-card"><strong>${state.favorites.length}</strong><span class="meta">Favorites</span></div></div><div class="glass stat-card" style="margin-bottom:18px"><div class="eyebrow">Learning flame</div><strong>${state.streak} days</strong><span class="meta">Best streak ${state.bestStreak} days · total mastery ${m.rate}%</span></div><div class="day-progress">${SCENES.map(s=>{const ws=dayWords(s.day),seen=ws.filter(w=>state.seen.includes(w.id)).length,skilled=ws.filter(w=>mastery(w.id)>=3).length;return `<div class="glass day-row"><span class="day-badge">D${String(s.day).padStart(2,'0')}</span><div><strong>${s.en}</strong><div class="progress-track"><div class="progress-fill" style="width:${skilled*5}%"></div></div></div><span class="meta">${seen}/20 seen · ${skilled}/20 skilled</span></div>`}).join('')}</div></section>`}
function render(){if(ui.view==='home')view.innerHTML=renderHome();if(ui.view==='map')view.innerHTML=renderMap();if(ui.view==='learn')view.innerHTML=renderLearn();if(ui.view==='practice')view.innerHTML=renderPractice();if(ui.view==='review')view.innerHTML=renderReview();if(ui.view==='wordbook')view.innerHTML=renderWordbook();if(ui.view==='progress')view.innerHTML=renderProgress()}
function nextWord(){if(ui.index<19){ui.index++;render()}else{const allSeen=dayWords(ui.day).every(w=>state.seen.includes(w.id));if(allSeen&&!state.completedDays.includes(ui.day)){state.completedDays.push(ui.day);saveState();showReward()}}}
function answer(id){const q=ui.practice.q;if(q.answered)return;q.answered=true;q.correct=id===q.target.id?id:false;if(q.correct)ui.practice.correctCount++;else ui.practice.wrongCount++;applyPractice(q.target.id,!!q.correct);render()}
function nextQuestion(){ui.spell=[];if(ui.practice.index+1>=ui.practice.total){ui.practice.complete=true;render();return}ui.practice.index++;ui.practice.q=questionFromQueue(ui.practice);if(ui.practice.mode==='spell'){ui.practice.letters=shuffle([...ui.practice.q.target.word]);ui.practice.used=[]}render()}
function chooseMode(mode){const pool=ui.practice.pool;ui.practice=createPracticeSession(pool,mode);ui.practice.q=questionFromQueue(ui.practice);ui.spell=[];if(mode==='spell'&&ui.practice.q){ui.practice.letters=shuffle([...ui.practice.q.target.word]);ui.practice.used=[]}render()}
function showToast(text){const t=$('#toast');t.textContent=text;t.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>t.classList.remove('show'),1800)}
function showReward(){const r=document.createElement('div');r.className='reward';r.innerHTML='<div class="reward-inner"><div class="eyebrow">Quest complete</div><strong>Constellation restored</strong><p>+ one mythic star</p></div>';document.body.append(r);setTimeout(()=>r.remove(),2700)}
document.addEventListener('click',e=>{const b=e.target.closest('button,[data-detail]');if(!b)return;if(b.dataset.view){if(b.dataset.view==='learn')setView('learn');else setView(b.dataset.view)}if(b.dataset.enterDay){ui.day=+b.dataset.enterDay;ui.index=state.lastPosition.day===ui.day?state.lastPosition.index||0:0;setView('learn')}if(b.dataset.wordIndex!==undefined){ui.index=+b.dataset.wordIndex;render()}if(b.dataset.step){stopSpeech();ui.speechOpen=false;ui.index=Math.max(0,Math.min(19,ui.index+(+b.dataset.step)));state.lastPosition={day:ui.day,index:ui.index};saveState();render()}if(b.dataset.confidence){applyConfidence(b.dataset.id,b.dataset.confidence);showToast(b.dataset.confidence==='know'?'Mastery brightened ✦':b.dataset.confidence==='vague'?'Added to review pool':'Added to mistakes');nextWord()}if(b.dataset.favorite){state.favorites=state.favorites.includes(b.dataset.favorite)?state.favorites.filter(x=>x!==b.dataset.favorite):uniq([...state.favorites,b.dataset.favorite]);saveState();render()}if(b.dataset.speakText)speakText(decodeURIComponent(b.dataset.speakText),{button:b});if(b.hasAttribute('data-speech-settings')){ui.speechOpen=!ui.speechOpen;render()}if(b.hasAttribute('data-close-speech-settings')){ui.speechOpen=false;render()}if(b.hasAttribute('data-voice-preview'))speakText('A clear voice makes every word easier to remember.',{button:b});if(b.hasAttribute('data-stop-speech'))stopSpeech();if(b.dataset.practiceDay)startPractice(+b.dataset.practiceDay,false);if(b.dataset.mode)chooseMode(b.dataset.mode);if(b.dataset.answer)answer(b.dataset.answer);if(b.hasAttribute('data-next-question'))nextQuestion();if(b.hasAttribute('data-end-practice'))setView(ui.review?'review':'map');if(b.hasAttribute('data-try-mode')){ui.practice=createPracticeSession(ui.practice.pool);render()}if(b.dataset.nextDay){ui.day=+b.dataset.nextDay;ui.index=0;setView('learn')}if(b.hasAttribute('data-start-review'))startPractice(recommendedDay(),true);if(b.dataset.letter!==undefined){const i=+b.dataset.letter;if(!ui.practice.used.includes(i)){ui.practice.used.push(i);ui.spell.push(ui.practice.letters[i]);render()}}if(b.dataset.spell==='undo'){const i=ui.practice.used.pop();if(i!==undefined)ui.spell.pop();render()}if(b.dataset.spell==='reset'){ui.practice.used=[];ui.spell=[];render()}if(b.dataset.spell==='check'&&!ui.practice.q.answered){const correct=ui.spell.join('').toLowerCase()===ui.practice.q.target.word.toLowerCase();ui.practice.q.answered=true;ui.practice.q.correct=correct?ui.practice.q.target.id:false;if(correct)ui.practice.correctCount++;else ui.practice.wrongCount++;applyPractice(ui.practice.q.target.id,correct);render()}if(b.dataset.bookTab){ui.bookTab=b.dataset.bookTab;ui.detail=null;render()}if(b.dataset.detail){ui.detail=b.dataset.detail;render()}if(b.hasAttribute('data-close-detail')){ui.detail=null;render()}if(b.dataset.action==='sound')showToast('Ambient mood is visual-only in this offline edition.');});
document.addEventListener('input',e=>{if(e.target.id==='word-search'){ui.search=e.target.value;const pos=e.target.selectionStart;render();const n=$('#word-search');n.focus();n.setSelectionRange(pos,pos)}const speechInput=[['rate','[data-speech-rate]'],['pitch','[data-speech-pitch]'],['volume','[data-speech-volume]']].find(([,selector])=>e.target.matches(selector));if(speechInput){const [key]=speechInput;state.speechSettings[key]=Number(e.target.value);saveState();const value=e.target.closest('label')?.querySelector(`[data-speech-value="${key}"]`);if(value)value.textContent=state.speechSettings[key].toFixed(2)}});
document.addEventListener('change',e=>{if(e.target.matches('[data-voice-select]')&&speechVoices.some(v=>v.voiceURI===e.target.value)){state.speechSettings.voiceURI=e.target.value;saveState()}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&ui.speechOpen){ui.speechOpen=false;render()}if(ui.view==='practice'&&ui.practice?.mode==='spell'&&/^[a-z]$/i.test(e.key)){const i=ui.practice.letters.findIndex((l,x)=>l.toLowerCase()===e.key.toLowerCase()&&!ui.practice.used.includes(x));if(i>=0){ui.practice.used.push(i);ui.spell.push(ui.practice.letters[i]);render()}}if((e.key==='Enter'||e.key===' ')&&e.target.matches('[data-detail]')){ui.detail=e.target.dataset.detail;render()}});
function initParticles(){const c=$('#starfield'),ctx=c.getContext&&c.getContext('2d');if(!ctx)return;let pts=[],raf;function resize(){const d=Math.min(devicePixelRatio||1,2);c.width=innerWidth*d;c.height=innerHeight*d;c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';ctx.setTransform(d,0,0,d,0,0);const count=Math.min(innerWidth<600?38:82,Math.floor(innerWidth*innerHeight/15000));pts=Array.from({length:count},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.3+.25,v:Math.random()*.16+.04,a:Math.random()*.55+.15,p:Math.random()*6.28}))}function draw(t){ctx.clearRect(0,0,innerWidth,innerHeight);for(const p of pts){p.y-=p.v;p.x+=Math.sin(t*.0003+p.p)*.08;if(p.y<-5)p.y=innerHeight+5;ctx.beginPath();ctx.fillStyle=`rgba(220,238,248,${p.a*(.55+.45*Math.sin(t*.001+p.p))})`;ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill()}raf=requestAnimationFrame(draw)}resize();addEventListener('resize',resize,{passive:true});document.addEventListener('visibilitychange',()=>{cancelAnimationFrame(raf);if(!document.hidden)draw(performance.now())});draw(0)}
function handleVoicesChanged(){loadVoices();if(ui.view==='learn')render()}
touchStreak();loadVoices();render();initParticles();if('speechSynthesis'in window){if(speechSynthesis.addEventListener)speechSynthesis.addEventListener('voiceschanged',handleVoicesChanged);else speechSynthesis.onvoiceschanged=handleVoicesChanged}
window.__ATLAS_TEST__={WORDS,SCENES,LISTS,defaultState,sanitizeState,clampMastery,uniq,makeQuestion,createPracticeSession,questionFromQueue,reviewPool,recommendedDay,startPractice,chooseMode,answer,nextQuestion,rankEnglishVoices,loadVoices,selectedVoice,speakText,renderCollocationConstellation,renderUsagePanels,getUI:()=>ui};
